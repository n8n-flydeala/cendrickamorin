<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Automation Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0a0a0a;
            color: white;
            font-family: 'Inter', sans-serif;
        }
        /* Red Glow Effect */
        .red-glow {
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.3);
        }
        .text-glow {
            text-shadow: 0 0 10px rgba(220, 38, 38, 0.5);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="max-w-5xl w-full grid md:grid-cols-2 gap-12 items-center">
        
        <div class="space-y-6">
            <div class="inline-block px-3 py-1 text-xs font-semibold tracking-wider text-green-400 border border-green-400 rounded-full bg-green-400/10">
                ● AVAILABLE FOR PROJECTS
            </div>
            
            <h1 class="text-6xl font-bold tracking-tighter">
                Cendrick <span class="text-red-600 text-glow">Amorin</span>
            </h1>
            
            <p class="text-xl text-gray-400 font-medium border-l-2 border-gray-700 pl-4">
                AI Automation Specialist | Web Designer | <br>
                GoHighLevel CRM Expert
            </p>
            
            <p class="text-gray-500 leading-relaxed max-w-md">
                Expert in AI automation, strategic web design, and workflow optimization. 
                I create intelligent systems that streamline operations and scale revenue.
            </p>

            <div class="flex gap-4 pt-4">
                <button class="px-8 py-3 bg-transparent border border-gray-700 rounded-lg hover:border-red-600 transition-all duration-300 font-semibold hover:red-glow">
                    View My Work
                </button>
                <button class="px-8 py-3 bg-transparent border border-gray-700 rounded-lg hover:border-red-600 transition-all duration-300 font-semibold hover:red-glow">
                    View Resume
                </button>
            </div>
        </div>

        <div class="relative flex justify-center">
            <div class="absolute inset-0 bg-red-600/10 blur-[100px] rounded-full"></div>
            
            <div class="relative z-10 w-80 h-96 overflow-hidden rounded-2xl border border-white/10 grayscale hover:grayscale-0 transition duration-500">
                <img src="images/profile-pic..jpg" alt="Profile" class="w-full h-full object-cover">
            </div>

            <div class="absolute -top-4 -right-4 w-12 h-12 bg-[#111] border border-red-600/50 rounded-full flex items-center justify-center red-glow animate-bounce">
                <span class="text-red-500">⚡</span>
            </div>
        </div>

    </div>

    <div class="fixed bottom-8 right-8">
        <button class="bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-full shadow-lg flex items-center gap-2 transition-all font-bold">
            <span>💬</span> Talk to My AI
        </button>
    </div>

</body>
</html>
